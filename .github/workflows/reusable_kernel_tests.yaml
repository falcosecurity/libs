name: Test drivers against a matrix of kernels/distros

on:
  workflow_dispatch:
    inputs:
      libsversion:
        description: 'libs version to be tested, eg: master'
        type: string
        required: false
        default: 'master'
      libsrepo:
        description: 'libs repo to be tested, eg: falcosecurity/libs'
        type: string
        required: false
        default: 'falcosecurity/libs'
  workflow_call:
    inputs:
      libsversion:
        description: 'libs version to be tested, eg: master'
        type: string
        required: false
        default: 'master'
      libsrepo:
        description: 'libs repo to be tested, eg: falcosecurity/libs'
        type: string
        required: false
        default: 'falcosecurity/libs'

concurrency:
  group: kernel-tests
  cancel-in-progress: false

jobs:
  test-kernels:
    strategy:
      fail-fast: false
      matrix:
        architecture: [ X64, ARM64 ]
    runs-on: [ "self-hosted", "linux", "${{matrix.architecture}}", "kernel-testing-matrix" ]
    steps:
      - uses: falcosecurity/kernel-testing@ba69d924c6f0145ecdddc57705a450ac45e20398
        id: kernel_tests
        with:
          libsversion: ${{ inputs.libsversion }}
          libsrepo: ${{ inputs.libsrepo }}
          build_matrix: 'true'
          images_tag: 'v0.4.0'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ansible_output_${{matrix.architecture}}
          path: ${{ steps.kernel_tests.outputs.ansible_output }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: matrix_${{matrix.architecture}}
          path: ${{ steps.kernel_tests.outputs.matrix_output }}
