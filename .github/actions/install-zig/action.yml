name: 'install-zig'
description: 'Install zig compiler and set ZIG/ZIG_TARGET/ZIG_TOOLCHAIN_FILE env vars. The zig.cmake toolchain file is bundled with this action.'

inputs:
  target:
    description: 'Zig target triple (default: <host-arch>-linux-gnu.2.17)'
    required: false
    default: ''
  zig_download_retries:
    description: 'Number of retries for the download'
    required: false
    default: 20

runs:
  using: "composite"
  steps:
    - name: Store zig version and architecture as local output
      shell: bash
      id: store
      env:
        ZIG_VERSION: '0.15.1'
      run: |
        ZIG_ARCH="$(uname -m)"
        if [[ "$ZIG_ARCH" == "ppc64le" ]]; then
        ZIG_ARCH=powerpc64le
        fi

        echo "zig_version=${ZIG_VERSION}" >> "$GITHUB_OUTPUT"
        echo "zig_arch=${ZIG_ARCH}" >> "$GITHUB_OUTPUT"

    - name: Download zig
      shell: bash
      run: |
        ATTEMPTS="${{ inputs.zig_download_retries }}"
        ZIG_VERSION="${{ steps.store.outputs.zig_version }}"
        ZIG_ARCHIVE_NAME="zig-${{ steps.store.outputs.zig_arch }}-linux-$ZIG_VERSION"
        wget --tries="$ATTEMPTS" -O "zig.tar.xz" "https://ziglang.org/download/$ZIG_VERSION/$ZIG_ARCHIVE_NAME.tar.xz"
        tar -xvf zig.tar.xz
        mv "$ZIG_ARCHIVE_NAME/" zig

    - name: Setup zig
      shell: bash
      id: zig
      run: |
        ZIG_DIR="$(pwd)/zig"
        echo "${ZIG_DIR}" >> $GITHUB_PATH
        echo "ZIG=${ZIG_DIR}/zig" >> $GITHUB_ENV
        if [ -n "${{ inputs.target }}" ]; then
          echo "ZIG_TARGET=${{ inputs.target }}" >> $GITHUB_ENV
        else
          echo "ZIG_TARGET=${{ steps.store.outputs.zig_arch }}-linux-gnu.2.17" >> $GITHUB_ENV
        fi
        ACTION_DIR="${{ github.action_path }}"
        if [ -f "${ACTION_DIR}/zig.cmake" ]; then
          cp "${ACTION_DIR}/zig.cmake" "${ZIG_DIR}/zig.cmake"
        else
          cp "${GITHUB_WORKSPACE}/.github/actions/install-zig/zig.cmake" "${ZIG_DIR}/zig.cmake"
        fi
        echo "ZIG_TOOLCHAIN_FILE=${ZIG_DIR}/zig.cmake" >> $GITHUB_ENV
